<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cadastro - Sistema de Saúde</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #dff6ff, #4facfe);
    }

    .box {
        width: 380px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #2196f3;
    }

    .link {
        text-align: center;
        margin-top: 10px;
        font-size: 14px;
    }

    .link a {
        color: #4facfe;
        text-decoration: none;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Criar Conta</h2>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <input type="password" id="confirmar" placeholder="Confirmar senha">

    <select id="tipo">
        <option value="paciente">Paciente</option>
        <option value="profissional">Profissional</option>
    </select>

    <button onclick="criarConta()">Criar Conta</button>

    <div class="link">
        Já tens conta? <a href="login.html">Entrar</a>
    </div>
</div>

<script>
function criarConta() {
    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;
    let confirmar = document.getElementById("confirmar").value;
    let tipo = document.getElementById("tipo").value;

    if (!nome || !email || !senha || !confirmar) {
        alert("Preenche todos os campos!");
        return;
    }

    if (senha !== confirmar) {
        alert("As senhas não coincidem!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let existe = users.find(u => u.email === email);
    if (existe) {
        alert("Este email já está registado!");
        return;
    }

    users.push({
        nome: nome,
        email: email,
        senha: senha,
        tipo: tipo
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Conta criada com sucesso!");

    window.location.href = "login.html";
}
</script>

</body>
</html>
