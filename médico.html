<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Médico</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}

h2{margin-bottom:20px}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:8px 12px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00c6ff;
color:white;
}

button:hover{
background:#0072ff;
}

#ficha{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,0.08);
border-radius:10px;
min-height:100px;
}

hr{opacity:0.2;margin:10px 0}
</style>
</head>

<body>

<div class="container">

<h2>👨‍⚕️ Painel do Médico</h2>

<h3>📋 Pacientes</h3>
<div id="lista"></div>

<div id="ficha"></div>

</div>

<script>

let pacientes = [
{nome:"Ana Silva",idade:30,estado:"Estável",ultima:"10 Abril"},
{nome:"Carlos Mendes",idade:45,estado:"Crítico",ultima:"12 Abril"},
{nome:"Maria João",idade:28,estado:"Em observação",ultima:"18 Abril"}
];

let lista = document.getElementById("lista");

pacientes.forEach(p=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<b>${p.nome}</b><br>
Idade: ${p.idade}<br>
<button onclick="abrirFicha('${p.nome}')">Ver Ficha Completa</button>
`;
lista.appendChild(div);
});

function abrirFicha(nome){
let p = pacientes.find(x=>x.nome===nome);

document.getElementById("ficha").innerHTML=`
<h3>🧾 Ficha Completa</h3>
<p><b>Nome:</b> ${p.nome}</p>
<p><b>Idade:</b> ${p.idade}</p>
<p><b>Estado:</b> ${p.estado}</p>
<p><b>Última consulta:</b> ${p.ultima}</p>

<hr>
<p>📋 Histórico:</p>
<ul>
<li>Consulta geral</li>
<li>Exame de sangue</li>
<li>Acompanhamento</li>
</ul>

<hr>
<p>⚠ Resumo automático: paciente em acompanhamento regular.</p>
`;
}

</script>

</body>
</html>
