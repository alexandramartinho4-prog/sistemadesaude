<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Médico</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        height: 100vh;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h1 {
        font-size: 24px;
        letter-spacing: 1px;
    }

    .container {
        display: grid;
        grid-template-columns: 250px 1fr;
        height: calc(100vh - 80px);
    }

    .sidebar {
        background: rgba(0,0,0,0.3);
        padding: 20px;
        border-right: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
    }

    .sidebar button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(0,198,255,0.6);
    }

    .main {
        padding: 30px;
        overflow-y: auto;
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    .card h2 {
        font-size: 18px;
        margin-bottom: 10px;
    }

    .patients {
        margin-top: 30px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover {
        background: rgba(255,255,255,0.05);
    }

</style>
</head>
<body>

<header>
    <h1>👨‍⚕️ Painel do Médico</h1>
    <div>Dr. João</div>
</header>

<div class="container">

    <div class="sidebar">
        <button>🏠 Dashboard</button>
        <button>📅 Consultas</button>
        <button>🧑‍🤝‍🧑 Pacientes</button>
        <button>➕ Nova Consulta</button>
        <button>⚙️ Configurações</button>
    </div>

    <div class="main">

        <div class="cards">
            <div class="card">
                <h2>Consultas Hoje</h2>
                <p>12</p>
            </div>

            <div class="card">
                <h2>Pacientes</h2>
                <p>58</p>
            </div>

            <div class="card">
                <h2>Emergências</h2>
                <p>3</p>
            </div>
        </div>

        <div class="patients">
            <h2>Lista de Pacientes</h2>

            <table>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Estado</th>
                </tr>

                <tr>
                    <td>Ana Silva</td>
                    <td>30</td>
                    <td>Estável</td>
                </tr>

                <tr>
                    <td>Carlos Mendes</td>
                    <td>45</td>
                    <td>Crítico</td>
                </tr>

                <tr>
                    <td>Maria João</td>
                    <td>28</td>
                    <td>Em análise</td>
                </tr>
            </table>
        </div>

    </div>

</div>

</body>
</html>
