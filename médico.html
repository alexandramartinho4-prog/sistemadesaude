<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel do Médico</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: lightblue;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .info {
            margin: 20px;
        }

        button {
            display: block;
            margin: 15px auto;
            padding: 12px;
            width: 220px;
            border: none;
            border-radius: 8px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1e7e34;
            transform: scale(1.05);
        }

        .sair {
            background-color: #dc3545;
        }

        .sair:hover {
            background-color: #a71d2a;
        }
    </style>
</head>

<body>

    <h1>Painel do Médico</h1>

    <div class="info">
        <p>Nome: Dr. Ofrania Martinho</p>
        <p>Especialidade: Clínica Geral</p>
    </div>

    <button onclick="alert('Lista de pacientes')">Ver pacientes</button>
    <button onclick="alert('Consultas de hoje')">Consultas do dia</button>
    <button onclick="alert('Adicionar diagnóstico')">Adicionar diagnóstico</button>
    <button onclick="alert('Histórico')">Histórico dos pacientes</button>
    <button class="sair" onclick="alert('Saiu')">Sair</button>

</body>
</html>
