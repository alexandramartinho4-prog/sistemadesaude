    <h3>Nossos Serviços:</h3>
    <p>✔ Marcação de consultas</p>
    <p>✔ Gestão de pacientes</p>

<!-- TELA DE LOGIN (fica escondida no início) -->
<div id="login" style="display: none; text-align: center; margin-top: 100px;">

    <h2>Login</h2>

    <input type="text" placeholder="Usuário"><br><br>
    <input type="password" placeholder="Senha"><br><br>

    <button>Entrar</button>

</div>


<script>
function entrar() {
    document.getElementById("boasvindas").style.display = "none";
    document.getElementById("login").style.display = "block";
}
</script>
