
<!DOCTYPE html>
<html>
<head>
    <title>Login Saúde Domiciliar</title>
</head>

<body background="https://images.unsplash.com/photo-1586773860418-d37222d8fce3">

    <center>

        <br><br><br><br>

        <table bgcolor="white" cellpadding="20" border="1">

            <tr>
                <td align="center">

                    <h2>Login do Sistema de Saúde</h2>

                    <form>

                        <label>Nome:</label><br>
                        <input type="text" name="nome"><br><br>

                        <label>E-mail:</label><br>
                        <input type="email" name="email"><br><br>

                        <label>Senha:</label><br>
                        <input type="password" name="senha"><br><br>

                        <label>Entrar como:</label><br>
                        <select>
                            <option>Paciente</option>
                            <option>Profissional</option>
                            <option>Administrador</option>
                        </select>

                        <br><br>

                        <input type="submit" value="Entrar">
                        <input type="button" value="Criar conta">

                    </form>

                </td>
            </tr>

        </table>

    </center>

</body>
</html>
