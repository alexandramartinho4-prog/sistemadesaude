<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body background="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80" align="center">

<br><br>

<h1>Login do Sistema</h1>

<form>

    <label>Nome:</label><br>
    <input type="text"><br><br>

    <label>Email:</label><br>
    <input type="email"><br><br>

    <label>Senha:</label><br>
    <input type="password"><br><br>

    <label>Entrar como:</label><br><br>

    <select id="tipo">
        <option value="paciente">Paciente</option>
        <option value="profissional">Profissional</option>
        <option value="admin">Administrador</option>
    </select>

    <br><br>

    <!-- BOTÃO FUNCIONAL SEM CSS (usa JS simples) -->
    <button type="button" onclick="entrar()">Entrar</button>

</form>

<br>

<a href="#">Esqueci a minha senha</a><br><br>

<button>Criar Conta</button>

<script>
function entrar() {
    var tipo = document.getElementById("tipo").value;

    if (tipo == "paciente") {
        window.location.href = "paciente.html";
    }

    if (tipo == "profissional") {
        window.location.href = "profissional.html";
    }

    if (tipo == "admin") {
        window.location.href = "admin.html";
    }
}
</script>

</body>
</html>
