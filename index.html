<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Saúde</title>
</head>

<body background="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80">

<!-- BOAS-VINDAS -->
<div id="boasvindas" align="center"
style="background-color:#0d6efd; color:white; height:100vh; padding-top:120px;">

    <h1>Sistema de Gestão de Saúde</h1>

    <p>Bem-vindo ao sistema</p>

    <h3>Nossos Serviços</h3>
    <p>✔ Marcação de consultas</p>
    <p>✔ Gestão de pacientes</p>
    <p>✔ Histórico médico</p>
    <p>✔ Atendimento rápido</p>

    <br><br>

    <button onclick="
        document.getElementById('boasvindas').style.display='none';
        document.getElementById('login').style.display='block';
    ">
        Entrar no Sistema
    </button>

</div>

<!-- LOGIN -->
<div id="login" style="display:none;" align="center">

    <h1>Login do Sistema</h1>

    <form>

        <label>Nome:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Senha:</label><br>
        <input type="password"><br><br>

        <label>Entrar como:</label><br><br>

        <select>
            <option value="paciente">Paciente</option>
            <option value="profissional">Profissional</option>
            <option value="admin">Administrador</option>
        </select>

        <br><br>

    </form>

    <!-- BOTÕES DE ENTRADA -->
    <p><a href="paciente.html">Entrar como Paciente</a></p>
    <p><a href="profissional.html">Entrar como Profissional</a></p>
    <p><a href="admin.html">Entrar como Administrador</a></p>

    <br>

    <a href="#">Esqueci a minha senha</a>

    <br><br>

    <button>Criar Conta</button>

</div>

</body>
</html>
