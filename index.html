<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Login - Saúde Domiciliar</title>
</head>

<body style="
  margin:0;
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
  background-size: cover;
">

  <!-- Camada para dar contraste na imagem -->
  <div style="
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0, 40, 80, 0.35);
  "></div>

  <!-- Caixa do login -->
  <div style="
    position: relative;
    width: 320px;
    margin: 80px auto;
    padding: 25px;
    background: rgba(255,255,255,0.92);
    border-radius: 12px;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
  ">

    <h2 style="text-align:center; color:#0b3d91;">Login</h2>

    <!-- Nome -->
    <label>Nome</label><br>
    <input type="text" style="width:100%; padding:8px; margin-bottom:10px;"><br>

    <!-- Email ou telefone -->
    <label>E-mail ou Telefone</label><br>
    <input type="text" style="width:100%; padding:8px; margin-bottom:10px;"><br>

    <!-- Senha -->
    <label>Senha</label><br>
    <input type="password" style="width:100%; padding:8px; margin-bottom:10px;"><br>

    <!-- Tipo de utilizador -->
    <label>Entrar como:</label><br>
    <input type="radio" name="tipo"> Paciente<br>
    <input type="radio" name="tipo"> Profissional<br>
    <input type="radio" name="tipo"> Administrador<br><br>

    <!-- Botão entrar -->
    <button style="
      width:100%;
      padding:10px;
      background:#0b3d91;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    ">
      Entrar
    </button>

    <br><br>

    <!-- Criar conta -->
    <button style="
      width:100%;
      padding:10px;
      background:#ffffff;
      color:#0b3d91;
      border:2px solid #0b3d91;
      border-radius:6px;
      cursor:pointer;
    ">
      Criar Conta
    </button>

  </div>

</body>
</html>
