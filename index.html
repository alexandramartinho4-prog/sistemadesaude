<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login - Saúde Domiciliar</title>
</head>

<body background="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1200&q=80">

    <center>

        <h2>Sistema de Gestão de Saúde Domiciliar</h2>

        <form>

            <p>Nome:</p>
            <input type="text" name="nome">

            <p>E-mail:</p>
            <input type="email" name="email">

            <p>Senha:</p>
            <input type="password" name="senha">

            <p>Criar conta:</p>
            <input type="checkbox"> Sim

            <p>Entrar como:</p>
            <input type="radio" name="tipo" value="paciente"> Paciente<br>
            <input type="radio" name="tipo" value="profissional"> Profissional<br>
            <input type="radio" name="tipo" value="admin"> Administrador

            <br><br>

            <input type="submit" value="Entrar">

        </form>

    </center>

</body>
</html>
