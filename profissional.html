<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel do Paciente</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body.paciente {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f7;
        }

        .container {
            width: 430px;
            background: #ffffff;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .container h1 {
            font-size: 22px;
            color: #1f2d3d;
            text-align: center;
            margin-bottom: 20px;
        }

        .info {
            background: #f6f8fb;
            border: 1px solid #e6e9ef;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info p {
            font-size: 14px;
            margin: 6px 0;
            color: #333;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu a {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            transition: 0.2s ease;
        }

        .menu a:hover {
            background: #1e4fd1;
            transform: translateY(-1px);
        }

        .sair {
            display: block;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ef4444;
            color: #ef4444;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s ease;
        }

        .sair:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body class="paciente">

<div class="container">

    <h1>Painel do Paciente</h1>

    <div class="info">
        <p><strong>Nome:</strong> Ofrania Martinho</p>
        <p><strong>Nº do Paciente:</strong> 12345</p>
        <p><strong>Última Consulta:</strong> 10/04/2026</p>
    </div>

    <div class="menu">
        <a href="#">Marcar Consulta</a>
        <a href="#">Ver Consultas</a>
        <a href="#">Histórico Médico</a>
        <a href="#">Atualizar Dados</a>
    </div>

    <a class="sair" href="login.html">Sair</a>

</div>

</body>
</html>
