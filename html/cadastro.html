<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Criar Conta</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#dff6ff,#4facfe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:white;
    padding:25px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align:center;
    margin-bottom:15px;
}

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
}

button {
    width:100%;
    padding:10px;
    background:#4facfe;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Criar Conta</h2>

    <input type="text" placeholder="Nome">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">
    <input type="password" placeholder="Confirmar senha">

    <select>
        <option>Paciente</option>
        <option>Profissional</option>
    </select>

    <button>Criar Conta</button>
</div>

</body>
</html>
