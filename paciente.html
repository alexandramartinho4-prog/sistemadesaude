<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paciente</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: white;
            padding: 20px;
            border-bottom: 2px solid #ccc;
        }

        h1 {
            text-align: center;
        }

        p {
            margin: 5px 0;
        }

        .botoes {
            margin: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Painel do Paciente</h1>

    <div class="header">
        <p>Nome: Ofrania Martinho</p>
        <p>Idade: 30 anos</p>
        <p>Data de nascimento: 10/10/2002</p>
    </div>

    <div class="botoes">
        <button>Marcar consultas</button>
        <button>Ver histórico do médico</button>
        <button>Minhas consultas</button>
        <button>Sair</button>
    </div>

</body>
</html>
