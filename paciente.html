<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Paciente</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    height: 100vh;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
    font-size: 24px;
}

.container {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: calc(100vh - 80px);
}

.sidebar {
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0,198,255,0.6);
}

.main {
    padding: 30px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

.section {
    margin-top: 30px;
}

ul {
    list-style: none;
    margin-top: 10px;
}

ul li {
    padding: 10px;
    background: rgba(255,255,255,0.05);
    margin-bottom: 10px;
    border-radius: 10px;
}

</style>
</head>
<body>

<header>
    <h1>🧑‍⚕️ Painel do Paciente</h1>
    <div>Bem-vindo, Ana</div>
</header>

<div class="container">

    <div class="sidebar">
        <button>🏠 Início</button>
        <button>📅 Minhas Consultas</button>
        <button>📄 Histórico</button>
        <button>👤 Perfil</button>
    </div>

    <div class="main">

        <div class="cards">
            <div class="card">
                <h2>Próxima Consulta</h2>
                <p>25 Abril - 10h</p>
            </div>

            <div class="card">
                <h2>Médico</h2>
                <p>Dr. João</p>
            </div>

            <div class="card">
                <h2>Estado</h2>
                <p>Em acompanhamento</p>
            </div>
        </div>

        <div class="section">
            <h2>Histórico Recente</h2>
            <ul>
                <li>Consulta geral - 10 Abril</li>
                <li>Exame de sangue - 05 Abril</li>
                <li>Consulta cardiologia - 20 Março</li>
            </ul>
        </div>

    </div>

</div>

</body>
</html>
