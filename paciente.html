<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Painel do Paciente</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #e6f7ff;
        display: flex;
        height: 100vh;
    }

    /* MENU ESQUERDO */
    .menu {
        width: 250px;
        background: #007BFF;
        color: white;
        padding: 20px;
    }

    .menu h2 {
        margin-top: 0;
    }

    .menu p {
        font-size: 14px;
        line-height: 1.6;
    }

    /* CONTEÚDO */
    .content {
        flex: 1;
        padding: 30px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
        padding: 10px 15px;
        margin: 8px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #007BFF;
        color: white;
        transition: 0.3s;
    }

    button:hover {
        background: #0056b3;
    }

    .sair {
        background: #dc3545;
    }

    .sair:hover {
        background: #a71d2a;
    }
</style>
</head>

<body>

<!-- MENU ESQUERDO -->
<div class="menu">
    <h2>🧑‍⚕️ Paciente</h2>
    <p>Ofrania Martinho</p>
    <p>30 anos</p>
    <p>Nascimento: 10/10/2002</p>
    <hr>
    <p>✔ Consultas<br>
       ✔ Histórico<br>
       ✔ Médicos<br>
       ✔ Marcação</p>
</div>

<!-- CONTEÚDO -->
<div class="content">

    <h1>Painel do Paciente</h1>

    <div class="card">
        <h3>Ações rápidas</h3>

        <button onclick="alert('Marcar consulta')">Marcar Consulta</button>
        <button onclick="alert('Ver histórico')">Histórico Médico</button>
        <button onclick="alert('Minhas consultas')">Minhas Consultas</button>
    </div>

    <div class="card">
        <h3>Conta</h3>
        <button class="sair" onclick="sair()">Sair</button>
    </div>

</div>

<script>
function sair(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
