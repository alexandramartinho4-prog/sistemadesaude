<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Paciente</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body.paciente{
            min-height:100vh;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width: 650px;
            max-width: 95%;
            background:#ffffff;
            border:1px solid #e6e9ee;
            border-radius:12px;
            padding:35px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1{
            font-size:26px;
            margin-bottom:20px;
            color:#1f2d3d;
        }

        .info{
            padding:20px;
            border:1px solid #eef1f5;
            border-radius:10px;
            margin-bottom:20px;
            background:#fafbfc;
        }

        .info p{
            margin:8px 0;
            color:#2c3e50;
            font-size:15px;
        }

        .menu{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:12px;
            margin-bottom:20px;
        }

        .menu a{
            padding:14px;
            background:#2f80ed;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            text-align:center;
            font-size:15px;
            transition:0.2s;
        }

        .menu a:hover{
            background:#256bd1;
            transform: translateY(-2px);
        }

        .sair{
            display:block;
            text-align:center;
            padding:14px;
            background:#2d3436;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            font-size:15px;
        }

        .sair:hover{
            background:#1f2426;
        }
    </style>
</head>

<body class="paciente">

<div class="container">

    <h1>Painel do Paciente</h1>

    <div class="info">
        <p><strong>Nome:</strong> Ofrania Martinho</p>
        <p><strong>Nº do Paciente:</strong> 12345</p>
        <p><strong>Última Consulta:</strong> 10/04/2026</p>
    </div>

    <div class="menu">
        <a href="#">Marcar Consulta</a>
        <a href="#">Ver Consultas</a>
        <a href="#">Histórico Médico</a>
        <a href="#">Atualizar Dados</a>
    </div>

    <a class="sair" href="login.html">Sair</a>

</div>

</body>
</html>
