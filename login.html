<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Login - Sistema de Saúde</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #dff6ff, #4facfe);
    }

    .login-box {
        width: 350px;
        padding: 30px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .input-box {
        margin-bottom: 15px;
    }

    .input-box input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    .btn:hover {
        background: #2196f3;
    }

    .link {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .link a {
        color: #4facfe;
        text-decoration: none;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Entrar no Sistema</h2>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" id="senha" placeholder="Senha">
    </div>

    <button class="btn" onclick="entrar()">Entrar</button>

    <div class="link">
        Não tens conta? <a href="cadastro.html">Criar conta</a>
    </div>
</div>

<script>
function entrar() {
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    if (!email || !senha) {
        alert("Preenche todos os campos!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email && u.senha === senha);

    if (!user) {
        alert("Email ou senha incorretos!");
        return;
    }

    alert("Bem-vindo, " + user.nome);

    // guardar sessão do utilizador logado
    localStorage.setItem("usuarioLogado", JSON.stringify(user));

    // redirecionamento por tipo
    if (user.tipo === "profissional") {
        window.location.href = "profissional.html";
    } else {
        window.location.href = "paciente.html";
    }
}
</script>

</body>
</html>
