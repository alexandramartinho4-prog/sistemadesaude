<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cadastro - Sistema de Saúde</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus, select:focus {
        border-color: #4facfe;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #00c6ff;
    }

    .link {
        text-align: center;
        margin-top: 15px;
    }

    .link a {
        text-decoration: none;
        color: #4facfe;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="container">

    <h2>Criar Conta</h2>

    <form>

        <input type="text" placeholder="Nome completo" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Senha" required>

        <select id="tipoUser" required>
            <option value="">Selecione o tipo de usuário</option>
            <option value="medico">Médico</option>
            <option value="paciente">Paciente</option>
        </select>

        <button type="button" onclick="cadastrar()">Cadastrar</button>

    </form>

    <div class="link">
        <a href="login.html">Já tenho conta</a>
    </div>

</div>

<script>
function cadastrar() {
    let tipo = document.getElementById("tipoUser").value;

    if (tipo === "paciente") {
        window.location.href = "paciente.html";
    } 
    else if (tipo === "medico") {
        window.location.href = "medico.html";
    } 
    else {
        alert("Escolhe o tipo de usuário");
    }
}
</script>

</body>
</html>
