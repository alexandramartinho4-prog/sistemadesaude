<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel do Administrador</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: #f4f6f9;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #1f2d3d;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #2563eb;
            color: white;
        }

        /* CONTEÚDO */
        .main {
            flex: 1;
            padding: 30px;
        }

        .header {
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            color: #1f2d3d;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            font-size: 14px;
            color: #666;
        }

        .topbar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .topbar span {
            color: #2563eb;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 180px;
            }
        }
    </style>
</head>

<body>

    <!-- MENU LATERAL -->
    <div class="sidebar">
        <h2>Administrador</h2>

        <a href="#">Dashboard</a>
        <a href="#">Pacientes</a>
        <a href="#">Médicos</a>
        <a href="#">Consultas</a>
        <a href="#">Relatórios</a>
        <a href="login.html">Sair</a>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main">

        <div class="topbar">
            Bem-vindo, <span>Administrador</span>
        </div>

        <div class="header">
            <h1>Painel de Controlo</h1>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Pacientes Registados</h3>
                <p>Gestão de todos os pacientes do sistema.</p>
            </div>

            <div class="card">
                <h3>Consultas Marcadas</h3>
                <p>Visualizar e gerir consultas agendadas.</p>
            </div>

            <div class="card">
                <h3>Médicos Ativos</h3>
                <p>Lista de médicos disponíveis no sistema.</p>
            </div>
        </div>

    </div>

</body>
</html>
